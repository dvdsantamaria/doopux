# Site settings
title: "Doop UX"
description: "Doop UX blends UX strategy, performant web development, AI automation and growth execution so brands launch faster and scale smarter."
url: "https://doopux.com"
baseurl: ""
locale: "en_US"

# Build settings
future: true
show_drafts: false
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Permalinks
permalink: /:year/:month/:day/:title/

# Include directories
includes_dir: partials

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Collections (for posts to work properly)
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Doop UX Team"

# Site metadata
default_meta_image: "/assets/doop-website-design.png"
default_hero_image: "/assets/doop-website-design.png"

organization:
  name: "Doop UX"
  legal_name: "Doop UX"
  url: "https://doopux.com"
  logo: "/assets/logo.png"
  same_as: []
  area_served: "Global"

seo_defaults:
  robots: "index,follow"
  twitter_card: "summary_large_image"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .sass-cache
  - .jekyll-cache
  - .jekyll-metadata
  - README.md
  - package.json
  - package-lock.json
  - BLOG_CONTENT_STRATEGY_2026.md
  - fix_links.sh
  - favi.sh
  - "*.sh"
  - ".DS_Store"
  - "*.DS_Store"
  - ".git"
  - ".gitignore"
