baseurl: ""
includes_dir: partials

# Disable default theme - we use custom layouts
theme: null

# Blog posts configuration
permalink: /:year/:month/:day/:title/

# Plugins for GitHub Pages
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

# Exclude files from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .sass-cache
  - .jekyll-cache
  - .jekyll-metadata
  - README.md
  - package.json
  - package-lock.json

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Doop UX Team"

title: "Doop UX"
description: "Doop UX blends UX strategy, performant web development, AI automation and growth execution so brands launch faster and scale smarter."
url: "https://doopux.com"
locale: "en_US"

default_meta_image: "/assets/doop-website-design.png"
default_hero_image: "/assets/doop-website-design.png"

organization:
  name: "Doop UX"
  legal_name: "Doop UX"
  url: "https://doopux.com"
  logo: "/assets/logo.png"
  same_as: []
  area_served: "Global"

seo_defaults:
  robots: "index,follow"
  twitter_card: "summary_large_image"
