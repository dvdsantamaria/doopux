# ============================================================
# METADATOS DE CONTENIDO
# ============================================================
content_guidelines:
  word_count: "1200-2000 palabras"
  tone: "Profesional pero accesible, experto pero no arrogante"
  structure: "Intro hook → problema → solución → case study Doop → actionable takeaways → CTA"
  seo_requirements:
    - "Keyword principal en H1, primer párrafo, y al menos un H2"
    - "Meta description 150-160 caracteres con CTA"
    - "Alt text descriptivo en todas las imágenes"
    - "Internal links a servicios de Doop UX"
    - "External links a fuentes autorizadas 2026"
    - "Schema markup: Article, FAQ cuando aplique"
  
client_testimonials_to_include:
  - "Boatique Marine - Website Development"
  - "Prana Ecotherapy - UX Redesign" 
  - "Beyond Limits Children's Foundation - UX + Automation"
  - "Northgate - Content System"
  - "NTT Pilates - Local SEO"
  - "Electric Vibes - Ecommerce"

competitor_references:
  - "No mencionar agencias competidoras directamente"
  - "Enfocarse en metodología propia de Doop UX"
  - "Usar 'algunas agencias' o 'la industria' para referencias generales"
